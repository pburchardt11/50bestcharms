<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#c4a87c"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4a87c"/>
      <stop offset="40%" stop-color="#e8d5a3"/>
      <stop offset="60%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#c4a87c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="80" fill="#080808" rx="8"/>

  <!-- "50" - large gold number -->
  <text x="20" y="58" font-family="'Cormorant Garamond', Georgia, serif" font-size="52" font-weight="700" fill="url(#gold)" letter-spacing="-2">50</text>

  <!-- Decorative line -->
  <line x1="88" y1="18" x2="88" y2="62" stroke="url(#goldShine)" stroke-width="1" opacity="0.4"/>

  <!-- "BEST" - small caps -->
  <text x="98" y="35" font-family="'Outfit', sans-serif" font-size="11" font-weight="600" fill="#c4a87c" letter-spacing="4" opacity="0.8">BEST</text>

  <!-- "Charms" - elegant serif -->
  <text x="98" y="58" font-family="'Cormorant Garamond', Georgia, serif" font-size="36" font-weight="400" fill="#f5f0e8" font-style="italic" letter-spacing="1">Charms</text>

  <!-- Small diamond accent -->
  <polygon points="210,26 213,29 210,32 207,29" fill="#c4a87c" opacity="0.5"/>
</svg>
